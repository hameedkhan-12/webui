services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-app}
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:?required}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DATABASE_USER:-postgres}:${DATABASE_PASSWORD}@postgres:5432/${DATABASE_NAME:-app}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      # R2 credentials (write access for publish uploads)
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:?required}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:?required}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:?required}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-published-sites}
      # R2 custom domain — what the Cloudflare Worker reads from
      R2_PUBLIC_URL: ${R2_PUBLIC_URL:?required}

      PUBLISH_BASE_DOMAIN: ${PUBLISH_BASE_DOMAIN:-yourdomain.com}
      MAX_BUNDLE_SIZE: ${MAX_BUNDLE_SIZE:-52428800} # 50MB
      MAX_BUILD_TIME_MS: ${MAX_BUILD_TIME_MS:-30000} # 30s
      PUBLISH_CONCURRENCY: ${PUBLISH_CONCURRENCY:-5}

      PORT: 3000
      NODE_ENV: production
    ports:
      - "3000:3000"
    networks:
      - internal
      - public
    deploy:
      replicas: ${API_REPLICAS:-2}
      resources:
        limits:
          cpus: "2"
          memory: 2G # esbuild needs memory for large projects
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  internal:
    driver: bridge
    internal: true
  public:
    driver: bridge
